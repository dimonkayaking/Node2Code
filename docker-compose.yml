services:
  db:
    image: postgres:16-alpine
    container_name: node2code-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: unity_bridge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: sql123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d unity_bridge"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: node2code-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: unity_bridge
      DB_USER: admin
      DB_PASSWORD: sql123
      PORT: 5000
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web_node_test
    container_name: node2code-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
